worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nodelay on;
    keepalive_timeout 3600;
    keepalive_requests 100000;

    server {
        listen 8080 http2;
        server_name _;

        location = / {
            return 200 "✅ Service OK | WS + HTTPUpgrade + gRPC";
            add_header Content-Type text/plain;
        }

        # WebSocket
        location ^~ /JonathanTrWS {
            proxy_pass http://127.0.0.1:10001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }

        location ^~ /JonathanVlWS {
            proxy_pass http://127.0.0.1:10002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }

        location ^~ /JonathanVmWS {
            proxy_pass http://127.0.0.1:10003;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }

        location ^~ /JonathanSsWS {
            proxy_pass http://127.0.0.1:10004;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }

        # HTTP Upgrade
        location ^~ /JonathanTrHU {
            proxy_pass http://127.0.0.1:11001;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }

        location ^~ /JonathanVlHU {
            proxy_pass http://127.0.0.1:11002;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }

        location ^~ /JonathanVmHU {
            proxy_pass http://127.0.0.1:11003;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }

        location ^~ /JonathanSsHU {
            proxy_pass http://127.0.0.1:11004;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }

        # gRPC
        location ^~ /JonathanGrpcVless {
            grpc_pass grpc://127.0.0.1:12001;
            grpc_set_header Host $host;
            grpc_set_header X-Forwarded-Proto $scheme;
            grpc_read_timeout 3600s;
            grpc_send_timeout 3600s;
            grpc_connect_timeout 10s;
            grpc_socket_keepalive on;
        }

        location ^~ /JonathanGrpcTr {
            grpc_pass grpc://127.0.0.1:12002;
            grpc_set_header Host $host;
            grpc_set_header X-Forwarded-Proto $scheme;
            grpc_read_timeout 3600s;
            grpc_send_timeout 3600s;
            grpc_connect_timeout 10s;
            grpc_socket_keepalive on;
        }

        location ^~ /JonathanGrpcVm {
            grpc_pass grpc://127.0.0.1:12003;
            grpc_set_header Host $host;
            grpc_set_header X-Forwarded-Proto $scheme;
            grpc_read_timeout 3600s;
            grpc_send_timeout 3600s;
            grpc_connect_timeout 10s;
            grpc_socket_keepalive on;
        }
    }
}
